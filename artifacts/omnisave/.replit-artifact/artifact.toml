kind = "web"
previewPath = "/"
title = "OmniSave - Free Online Video Downloader"
version = "1.0.0"
id = "artifacts/omnisave"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23671

[services.development]
run = "pnpm --filter @workspace/omnisave run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omnisave", "run", "build" ]
publicDir = "artifacts/omnisave/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23671"
BASE_PATH = "/"
